{% extends "base.html" %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 70vh;">
  <div style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center;">
    <h2 style="margin-bottom: 10px; color: #333; font-size: 28px;">Crea Account</h2>
    <p style="color: #666; margin-bottom: 30px;">Portale Omnipredict</p>

    <form method="post" style="text-align: left;">
      {% csrf_token %}
      {{ form.as_p }}

      <div style="margin-top: 30px; text-align: center;">
        <button type="submit" style="background: #223166; color: white; border: none; padding: 12px 30px; border-radius: 6px; font-size: 16px; cursor: pointer; margin-right: 10px;">
          Registrati
        </button>
        <a href="{% url 'home' %}" style="background: #6c757d; color: white; text-decoration: none; padding: 12px 30px; border-radius: 6px; font-size: 16px; display: inline-block;">
          Torna alla Home
        </a>
      </div>
    </form>

    <div style="margin-top: 20px;">
    </div>
  </div>
</div>
{% endblock %}
